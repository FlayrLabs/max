# Redirect the old domain (and any www) → canonical trymax.io
server {
    listen 80;
    server_name askmax.flayrlabs.com www.askmax.flayrlabs.com www.trymax.io;
    return 301 https://trymax.io$request_uri;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (static marketing site — no inline scripts, no backend)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Clean URLs: /privacy → privacy.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Long cache for static assets (a location block resets inherited add_headers,
    # so re-declare the ones that matter here)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    error_page 404 /index.html;
}
