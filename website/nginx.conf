server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs: /privacy → privacy.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Long cache for static assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    error_page 404 /index.html;
}
